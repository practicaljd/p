import java.awt.BorderLayout;
import java.awt.event.ActionEvent;
import java.io.BufferedReader;
import java.io.InputStreamReader;
import java.io.PrintWriter;
import java.net.ServerSocket;
import java.net.Socket;
import javax.swing.JButton;
import javax.swing.JFrame;
import javax.swing.JScrollPane;
import javax.swing.JTextArea;
import javax.swing.JTextField;
import javax.swing.SwingUtilities;

public class ChatServer extends JFrame {
  private final JTextArea area = new JTextArea();
  private final JTextField field = new JTextField();
  private PrintWriter out;

  public ChatServer() {
    setTitle("Chat Server");
    area.setEditable(false);
    add(new JScrollPane(area), BorderLayout.CENTER);
    JButton send = new JButton("Send");
    send.addActionListener(this::sendMessage);
    field.addActionListener(this::sendMessage);
    add(field, BorderLayout.NORTH);
    add(send, BorderLayout.SOUTH);
    setSize(420, 320);
    setDefaultCloseOperation(EXIT_ON_CLOSE);
    setVisible(true);
  }

  private void sendMessage(ActionEvent event) {
    if (out == null) {
      return;
    }
    String message = field.getText().trim();
    if (message.isEmpty()) {
      return;
    }
    out.println(message);
    append("Server: " + message);
    field.setText("");
  }

  private void append(String text) {
    SwingUtilities.invokeLater(() -> area.append(text + "\\n"));
  }

  private void startServer() throws Exception {
    ServerSocket serverSocket = new ServerSocket(5000);
    Socket socket = serverSocket.accept();
    out = new PrintWriter(socket.getOutputStream(), true);
    BufferedReader in = new BufferedReader(new InputStreamReader(socket.getInputStream()));
    new Thread(() -> {
      try {
        String line;
        while ((line = in.readLine()) != null) {
          append("Client: " + line);
        }
      } catch (Exception ignored) {
      }
    }).start();
  }

  public static void main(String[] args) throws Exception {
    ChatServer server = new ChatServer();
    server.startServer();
  }
}

import android.database.Cursor;
import android.database.sqlite.SQLiteDatabase;
import android.database.sqlite.SQLiteOpenHelper;

public class DBHelper extends SQLiteOpenHelper {
  public DBHelper(Context context) {
    super(context, "EmpDB", null, 1);
  }

  @Override
  public void onCreate(SQLiteDatabase db) {
    db.execSQL("CREATE TABLE Employee(Eno INTEGER PRIMARY KEY AUTOINCREMENT,Ename TEXT,Designation TEXT,Salary REAL)");
  }

  @Override
  public void onUpgrade(SQLiteDatabase db, int oldVersion, int newVersion) {
    db.execSQL("DROP TABLE IF EXISTS Employee");
    onCreate(db);
  }

  public long insert(String name, String designation, double salary) {
    ContentValues cv = new ContentValues();
    cv.put("Ename", name);
    cv.put("Designation", designation);
    cv.put("Salary", salary);
    return getWritableDatabase().insert("Employee", null, cv);
  }

  public Cursor getAll() {
    return getReadableDatabase().rawQuery("SELECT * FROM Employee", null);
  }
}

      String desg = etDesg.getText().toString();
      double salary = Double.parseDouble(etSalary.getText().toString());
      db.insert(name, desg, salary);
      Toast.makeText(this, "Employee Added", Toast.LENGTH_SHORT).show();
    });

    btnShow.setOnClickListener(v -> {
      Cursor c = db.getAll();
      StringBuilder sb = new StringBuilder();
      while (c.moveToNext()) {
        sb.append(c.getInt(0)).append(" | ")
          .append(c.getString(1)).append(" | ")
          .append(c.getString(2)).append(" | ")
          .append(c.getDouble(3)).append("\\n");
      }
      Toast.makeText(this, sb.toString(), Toast.LENGTH_LONG).show();
    });

    tvTitle.setText(data[position][0]);
    tvDesc.setText(data[position][1]);
    imgIcon.setImageResource(R.drawable.android_icon);
    return view;
  }

    const state = {
      slips: [],
      slipMap: new Map(),
      activeSlipNumber: null
    };

    const slipBuffer = document.getElementById("slipBuffer");

    function normalizeNewlines(text) {
      return text.replace(/\r\n/g, "\n").replace(/\r/g, "\n");
    }

    function parseSlips(raw) {
      return normalizeNewlines(raw)
        .split(/\n(?=\s*SLIP\s+\d+\s+-)/)
        .map(chunk => chunk.trim())
        .filter(Boolean)
        .map(chunk => {
          const lines = chunk.split("\n");
          const header = lines[0].trim();
          const headerMatch = header.match(/^SLIP\s+(\d+)\s+-\s+(.+)$/);
          if (!headerMatch) {
            return null;
          }
          const number = Number(headerMatch[1]);
          const title = headerMatch[2].trim();
          const sections = [];
          for (let i = 1; i < lines.length; i += 1) {
            const headMatch = lines[i].trim().match(/^Q([12][AB])\s+\[(\d+)M\]\s+-\s+(.+)$/);
            if (!headMatch) {
              continue;
            }
            let j = i + 1;
            while (j < lines.length && !lines[j].trim().match(/^Q([12][AB])\s+\[(\d+)M\]\s+-\s+(.+)$/)) {
              j += 1;
            }
            const blockLines = lines.slice(i + 1, j);
            const promptIndex = blockLines.findIndex(line => line.trim().startsWith("Q:"));
            const prompt = promptIndex >= 0 ? blockLines[promptIndex].trim().replace(/^Q:\s*/, "") : "";
            const bodyLines = promptIndex >= 0 ? blockLines.slice(promptIndex + 1) : blockLines;
            sections.push({
              slipNumber: number,
              key: `Q${headMatch[1]}`,
              title: headMatch[3].trim(),
              prompt,
              body: bodyLines.join("\n").trim()
            });
            i = j - 1;
          }
          return { number, title, sections };
        })
        .filter(Boolean);
    }

    function getOverride(section) {
      const entry = manualOverrides.find(item => item.match(section));
      return entry ? entry.body.trim() : null;
    }

    function resolveBody(section) {
      if (window.SLIP_OVERRIDES) {
        const exactKey = `${section.slipNumber}-${section.key}`;
        const exactOverride = window.SLIP_OVERRIDES[exactKey];
        if (typeof exactOverride === "string" && exactOverride.trim()) {
          return exactOverride.trim();
        }
      }
      const override = getOverride(section);
      if (override) {
        return override;
      }
      const refMatch = `${section.title}\n${section.prompt}\n${section.body}`.match(/Slip\s+(\d+)\s+Q([12][AB])/i);
      if (refMatch) {
        const refSlip = state.slipMap.get(Number(refMatch[1]));
        if (refSlip) {
          const refSection = refSlip.sections.find(item => item.key.toUpperCase() === `Q${refMatch[2].toUpperCase()}`);
          if (refSection && refSection !== section) {
            return resolveBody(refSection);
          }
        }
      }
      return section.body.trim();
    }

    function stripComments(text) {
      return text
        .replace(/\/\*[\s\S]*?\*\//g, "")
        .split("\n")
        .map(line => line.replace(/\s\/\/.*$/, "").replace(/^──\s*/, "").trimEnd())
        .filter((line, index, array) => line.trim() !== "" || (index > 0 && array[index - 1].trim() !== ""))
        .join("\n")
        .replace(/\n{3,}/g, "\n\n")
        .trim();
    }

    function getCopyText(section) {
      return stripComments(resolveBody(section));
    }

    async function copyText(text) {
      try {
        await navigator.clipboard.writeText(text);
        return true;
      } catch (error) {
        const area = document.createElement("textarea");
        area.value = text;
        area.style.position = "fixed";
        area.style.left = "-9999px";
        document.body.appendChild(area);
        area.focus();
        area.select();
        const copied = document.execCommand("copy");
        document.body.removeChild(area);
        return copied;
      }
    }

    async function copySection(index) {
      tryOpenBufferedSlip();
      const slip = state.slipMap.get(state.activeSlipNumber);
      if (!slip || !slip.sections[index]) {
        return;
      }
      await copyText(getCopyText(slip.sections[index]));
    }

    function openSlip(number) {
      if (state.slipMap.has(Number(number))) {
        state.activeSlipNumber = Number(number);
        slipBuffer.value = String(number);
      }
    }

    function tryOpenBufferedSlip() {
      const typedBuffer = slipBuffer.value.replace(/\D/g, "").slice(0, 3);
      slipBuffer.value = typedBuffer;
      if (!typedBuffer) {
        return;
      }
      const exact = state.slipMap.get(Number(typedBuffer));
      if (exact) {
        openSlip(exact.number);
      }
    }

    function syncBuffer() {
      const typedBuffer = slipBuffer.value.replace(/\D/g, "").slice(0, 3);
      slipBuffer.value = typedBuffer;
      if (!typedBuffer) {
        return;
      }
      const exact = state.slipMap.get(Number(typedBuffer));
      if (exact) {
        openSlip(exact.number);
      }
    }

    function focusBuffer() {
      slipBuffer.focus();
      slipBuffer.select();
    }

    function bindEvents() {
      slipBuffer.addEventListener("input", () => {
        syncBuffer();
      });

      document.addEventListener("keydown", async event => {
        if (event.ctrlKey && /^[1-4]$/.test(event.key)) {
          event.preventDefault();
          await copySection(Number(event.key) - 1);
          return;
        }

        if (event.key === "Escape") {
          slipBuffer.value = "";
          return;
        }

        if (event.key === "Enter") {
          event.preventDefault();
          tryOpenBufferedSlip();
          return;
        }
      });

      document.addEventListener("click", () => focusBuffer());
      window.addEventListener("load", () => focusBuffer());
      window.addEventListener("focus", () => focusBuffer());
      document.addEventListener("visibilitychange", () => {
        if (document.visibilityState === "visible") {
          focusBuffer();
        }
      });
      slipBuffer.addEventListener("blur", () => {
        setTimeout(focusBuffer, 0);
      });
    }

    function init() {
      state.slips = parseSlips(window.SLIP_RAW || "");
      state.slips.forEach(slip => state.slipMap.set(slip.number, slip));
      bindEvents();
      state.activeSlipNumber = null;
      slipBuffer.value = "";
      focusBuffer();
    }

    init();
  </script>
